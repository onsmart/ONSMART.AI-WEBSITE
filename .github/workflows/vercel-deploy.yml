name: Vercel Deploy (Deploy Hook)

on:
  push:
    branches: [ "main", "Mateus" ]   # troque se seu branch for outro
  workflow_dispatch:        # opção de disparar manualmente

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")
          echo "HTTP Status: $response"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Failed to trigger Vercel Deploy Hook"
            exit 1
          fi
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
